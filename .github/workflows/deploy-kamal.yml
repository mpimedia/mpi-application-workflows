name: Deploy (Kamal)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: string

jobs:
  deploy:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest

    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_DEPLOYMENT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up correct build driver for Docker
        uses: docker/setup-buildx-action@v4

      - name: Expose GitHub Runtime for cache
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Configure SSH Key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}

      - name: Add host key to known_hosts
        run: |
          mkdir -p -m 700 ~/.ssh/
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Build and deploy to staging
        if: inputs.environment == 'staging'
        run: |
          ./bin/kamal build push --output=docker -d staging
          ./bin/kamal deploy -d staging

      - name: Build and deploy to production
        if: inputs.environment == 'production'
        run: |
          ./bin/kamal build push --output=docker
          ./bin/kamal deploy
