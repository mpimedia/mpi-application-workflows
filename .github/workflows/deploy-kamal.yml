name: Deploy (Kamal)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: string

jobs:
  deploy:
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-latest

    env:
      OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_DEPLOYMENT_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up correct build driver for Docker
        uses: docker/setup-buildx-action@v4

      - name: Expose GitHub Runtime for cache
        uses: crazy-max/ghaction-github-runtime@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Configure SSH Key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOYMENT_PRIVATE_KEY }}

      - name: Add host key to known_hosts
        run: |
          mkdir -p -m 700 ~/.ssh/
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
        env:
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}

      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v2

      - name: Build and deploy to staging
        if: inputs.environment == 'staging'
        run: |
          ./bin/kamal build push --output=docker -d staging
          ./bin/kamal deploy -d staging

      - name: Build and deploy to production
        if: inputs.environment == 'production'
        run: |
          ./bin/kamal build push --output=docker
          ./bin/kamal deploy

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Send failure notification
        env:
          POSTMARK_TOKEN: ${{ secrets.POSTMARK_NOTIFICATIONS_SMTP_TOKEN }}
          WORKFLOW_FROM: ${{ secrets.WORKFLOW_FROM_EMAIL }}
          WORKFLOW_TO: ${{ secrets.WORKFLOW_TO_EMAIL }}
        run: |
          SUBJECT="❌ GitHub Action Failed: ${{ github.repository }} – ${{ github.workflow }}"
          BODY=$(cat <<'BODY_EOF'
          Workflow:  ${{ github.workflow }}
          Branch:    ${{ github.ref_name }}
          Commit:    ${{ github.event.head_commit.message || 'N/A' }}
          SHA:       ${{ github.sha }}
          Author:    ${{ github.actor }}
          Triggered: ${{ github.event_name }}

          Job Results:
            deploy: ${{ needs.deploy.result }}

          View run:  ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          BODY_EOF
          )
          JSON=$(jq -n \
            --arg from "$WORKFLOW_FROM" \
            --arg to "$WORKFLOW_TO" \
            --arg subject "$SUBJECT" \
            --arg body "$BODY" \
            '{From: $from, To: $to, Subject: $subject, TextBody: $body}')
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.postmarkapp.com/email" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "X-Postmark-Server-Token: $POSTMARK_TOKEN" \
            -d "$JSON")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          RESP_BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Postmark response (HTTP $HTTP_CODE): $RESP_BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Postmark API returned HTTP $HTTP_CODE: $RESP_BODY"
            exit 1
          fi
