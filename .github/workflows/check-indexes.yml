name: Check Indexes

on:
  workflow_call:

jobs:
  check-indexes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check Migration Indexes
        uses: speedshop/ids_must_be_indexed@v1.2.3

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [check-indexes]
    if: failure()
    steps:
      - name: Send failure notification
        env:
          POSTMARK_TOKEN: ${{ secrets.POSTMARK_NOTIFICATIONS_SMTP_TOKEN }}
          WORKFLOW_FROM: ${{ secrets.WORKFLOW_FROM_EMAIL }}
          WORKFLOW_TO: ${{ secrets.WORKFLOW_TO_EMAIL }}
          # Untrusted/attacker-influenceable values are passed via env (never
          # interpolated into the script body) to prevent workflow injection.
          WORKFLOW_NAME: ${{ github.workflow }}
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_MSG: ${{ github.event.head_commit.message || 'N/A' }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ACTOR: ${{ github.actor }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RESULT_CHECK_INDEXES: ${{ needs.check-indexes.result }}
        run: |
          SUBJECT=$(printf '\u274c GitHub Action Failed: %s \u2013 %s' "$REPO" "$WORKFLOW_NAME")
          BODY=$(cat <<BODY_EOF
          Workflow:  $WORKFLOW_NAME
          Branch:    $BRANCH_NAME
          Commit:    $COMMIT_MSG
          SHA:       $COMMIT_SHA
          Author:    $RUN_ACTOR
          Triggered: $EVENT_NAME

          Job Results:
            check-indexes: $RESULT_CHECK_INDEXES

          View run:  $RUN_URL
          BODY_EOF
          )
          JSON=$(jq -n \
            --arg from "$WORKFLOW_FROM" \
            --arg to "$WORKFLOW_TO" \
            --arg subject "$SUBJECT" \
            --arg body "$BODY" \
            '{From: $from, To: $to, Subject: $subject, TextBody: $body}')
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "https://api.postmarkapp.com/email" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -H "X-Postmark-Server-Token: $POSTMARK_TOKEN" \
            -d "$JSON")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          RESP_BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Postmark response (HTTP $HTTP_CODE): $RESP_BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Postmark API returned HTTP $HTTP_CODE: $RESP_BODY"
            exit 1
          fi
